<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ไฟล์ทั้งหมด</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <span id="welcomeMsg"></span>
    <div class="topbar-actions">
      <button id="adminLink" class="secondary-btn hidden">จัดการผู้ใช้</button>
      <button id="dm-btn" title="สลับ Dark/Light Mode">🌙</button>
      <button id="logoutBtn">ออกจากระบบ</button>
    </div>
  </header>

  <div class="layout">
    <nav id="categoryList" class="sidebar">
      <p class="loading">กำลังโหลดหมวดหมู่...</p>
    </nav>

    <main id="fileArea" class="content">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 ค้นหาไฟล์จากชื่อ...">
        <button id="uploadBtn" class="primary-btn hidden">+ อัปโหลดไฟล์</button>
      </div>
      <div id="contentBody">
        <p class="hint">เลือกหมวดหมู่ทางซ้ายเพื่อดูไฟล์ หรือพิมพ์ค้นหาด้านบน</p>
      </div>
    </main>
  </div>

  <input type="file" id="fileInput" class="hidden">

  <!-- modal ตั้งชื่อไฟล์ก่อนอัปโหลด (เฉพาะ admin) -->
  <div id="uploadModal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>อัปโหลดไฟล์</h3>
      <p class="hint" id="uploadTargetHint"></p>

      <label class="field-label">ชื่อไฟล์ที่จะบันทึก</label>
      <input type="text" id="uploadNameInput" placeholder="เช่น คำสั่งที่ 1-2569">

      <div class="modal-actions">
        <button id="uploadCancelBtn" class="secondary-btn">ยกเลิก</button>
        <button id="uploadConfirmBtn" class="primary-btn">อัปโหลด</button>
      </div>
      <p id="uploadError" class="error-msg"></p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="darkmode.js"></script>
  <script src="files.js"></script>
</body>
</html>
